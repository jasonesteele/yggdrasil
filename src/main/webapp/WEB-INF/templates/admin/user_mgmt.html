<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity">
<head th:replace="fragments/page :: head (title='Yggdrasil - Admin - User Management')">
</head>
<body>
  <script>
    require(['app/admin/user_mgmt'], function (user_mgmt) {
    	user_mgmt.initialize();
    });
  </script>

  <nav th:replace="fragments/page :: navbar"></nav>

  <script id="deleteButton" type="text/template">
    <a class="rowControl" href="#" title="Delete user">
      <span class="glyphicon glyphicon-remove" aria-hidden="true"></span>
    </a>
  </script>

  <script id="addButton" type="text/template">
    <a id="addButton" href="#" title="Add a new user">
      <span class="glyphicon glyphicon-plus" aria-hidden="true"></span>
    </a>
  </script>

  <div class="modal fade" id="addUserModal" tabindex="-1" role="dialog"
    aria-labelledby="addUserModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <button type="button" class="close" data-dismiss="modal"
            aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
          <h4 class="modal-title" id="addUserModalLabel">Add a new user</h4>
        </div>
        <div class="modal-body">
        Stuff to add user here
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-default" 
              data-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary">Add User</button>
        </div>
      </div>
    </div>
  </div>

  <div id="userList"></div>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity">
<head th:replace="fragments/page :: head (title='Yggdrasil - Login')">
</head>
<body>
  <script>
    require(['app/login'], function () {});
  </script>

  <nav class="navbar navbar-default">
    <div class="container-fluid">
      <!-- Brand and toggle get grouped for better mobile display -->
      <div class="navbar-header">
        <button type="button" class="navbar-toggle collapsed"
          data-toggle="collapse"
          data-target="#bs-example-navbar-collapse-1">
          <span class="sr-only">Toggle navigation</span> 
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
        </button>
        <a class="navbar-brand" href="#">Yggdrasil</a>
      </div>

      <form name="f" class="navbar-form navbar-right" th:action="@{/login}"
        method="post">
        <div class="form-group">
          <input type="text" id="username" name="username" placeholder="Username" /> 
          <input type="password" id="password" name="password" placeholder="Password" />
        </div>
        <button type="submit" class="btn btn-default">Log in</button>
      </form>

      <!-- Collect the nav links, forms, and other content for toggling -->
      <div class="collapse navbar-collapse"
        id="bs-example-navbar-collapse-1">
        <ul class="nav navbar-nav">
        </ul>
      </div>
      <!-- /.navbar-collapse -->
    </div>
    <!-- /.container-fluid -->
  </nav>

  <div th:if="${param.error}" class="alert alert-danger">Invalid username and password.</div>
  <div th:if="${param.logout}" class="alert alert-success">You have been logged out.</div>
</body>
</html>

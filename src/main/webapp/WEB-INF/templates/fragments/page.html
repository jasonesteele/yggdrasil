<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity">
<head th:fragment="head (title)">
<title th:text="${title}">Ygdrassil - Page</title>

<meta charset="utf-8"/>
<meta http-equiv="X-UA-Compatible" content="IE=edge"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="_csrf" th:content="${_csrf.token}" />
<!-- default header name is X-CSRF-TOKEN -->
<meta name="_csrf_header" th:content="${_csrf.headerName}" />

<!-- Bootstrap -->
<link th:href="@{/css/bootstrap.css}" rel="stylesheet"/>
<link th:href="@{/css/backgrid.css}" rel="stylesheet"/>
<link th:href="@{/css/app.css}" rel="stylesheet"/>

<!-- HTML5 shim and Respond.js for IE8 support of HTML5 elements and media queries -->
<!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
<!--[if lt IE 9]>
      <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
      <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
    <![endif]-->
    
<script th:inline="javascript">
  /*<![CDATA[*/
    var contextPath = /*[[@{/}]]*/ '/';
  /*]]>*/
</script>
<script th:src="@{/js/config.js}"></script>
<script th:src="@{/js/lib/require.js}"></script>

</head>
<body>
  <nav class="navbar navbar-default" th:fragment="navbar">
    <div class="container-fluid">
      <!-- Brand and toggle get grouped for better mobile display -->
      <div class="navbar-header">
        <button type="button" class="navbar-toggle collapsed"
          data-toggle="collapse" data-target="#bs-example-navbar-collapse-1">
          <span class="sr-only">Toggle navigation</span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
        </button>
        <a class="navbar-brand" th:href="@{/}">Yggdrasil</a>
      </div>

      <!-- Collect the nav links, forms, and other content for toggling -->
      <div class="collapse navbar-collapse"
        id="bs-example-navbar-collapse-1">
        <!-- Left side navbar items -->
        <ul sec:authorize="hasRole('ROLE_ADMIN')" class="nav navbar-nav">
          <li sec:authorize="hasRole('PERM_ACCOUNT_ADMIN')" class="dropdown">
            <a href="#" class="dropdown-toggle" data-toggle="dropdown" 
               role="button" aria-expanded="false">Admin <span class="caret"></span></a>
            <ul class="dropdown-menu" role="menu">
              <li><a th:href="@{/admin/user_mgmt}">User Management</a></li>
            </ul>
          </li>
        </ul>
        
        <!-- Right side navbar items -->
        <ul class="nav navbar-nav navbar-right">
          <li data-placement="bottom">
            <a href="#" title="Logout" onclick="document.getElementById('logout').submit();">
              <span class="glyphicon glyphicon-off" aria-hidden="true"></span>
              <span class="navbar-icon-text">Logout</span>
            </a>
            <form id="logout" th:action="@{/logout}" method="post">
            </form>
          </li>
        </ul>
        
        <p class="navbar-right navbar-text hidden-xs">
          <span sec:authentication="principal.username">User</span>
        </p>
      </div>
      <!-- /.navbar-collapse -->
    </div>
    <!-- /.container-fluid -->
  </nav>
</body>
</html>
